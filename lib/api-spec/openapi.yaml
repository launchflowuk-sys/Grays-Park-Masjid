components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error
    AdminRole:
      type: string
      enum:
        - super_admin
        - masjid_admin
        - education_admin
        - donation_admin
        - content_editor
        - read_only
    AdminUser:
      type: object
      properties:
        id:
          type: string
        email:
          type: string
        name:
          type: string
        role:
          $ref: "#/components/schemas/AdminRole"
        active:
          type: boolean
        lastLoginAt:
          type: ["string", "null"]
        createdAt:
          type: string
      required:
        - id
        - email
        - name
        - role
        - active
        - createdAt
    LoginInput:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 1
      required:
        - email
        - password
    CreateAdminUserInput:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
        name:
          type: string
        role:
          $ref: "#/components/schemas/AdminRole"
        active:
          type: boolean
      required:
        - email
        - password
        - name
        - role
    PatchAdminUserInput:
      type: object
      properties:
        name:
          type: string
        role:
          $ref: "#/components/schemas/AdminRole"
        active:
          type: boolean
        password:
          type: string
          minLength: 8
    ForgotPasswordInput:
      type: object
      properties:
        email:
          type: string
          format: email
      required:
        - email
    ResetPasswordInput:
      type: object
      properties:
        token:
          type: string
        password:
          type: string
          minLength: 8
      required:
        - token
        - password
    PrayerTime:
      type: object
      properties:
        id:
          type: string
        date:
          type: string
        fajrAdhan:
          type: string
        fajrIqamah:
          type: string
        dhuhrAdhan:
          type: string
        dhuhrIqamah:
          type: string
        asrAdhan:
          type: string
        asrIqamah:
          type: string
        maghribAdhan:
          type: string
        maghribIqamah:
          type: string
        ishaAdhan:
          type: string
        ishaIqamah:
          type: string
        jummahKhutbah:
          type: ["string", "null"]
        jummahIqamah:
          type: ["string", "null"]
        sunrise:
          type: ["string", "null"]
        createdAt:
          type: string
      required:
        - id
        - date
        - fajrAdhan
        - fajrIqamah
        - dhuhrAdhan
        - dhuhrIqamah
        - asrAdhan
        - asrIqamah
        - maghribAdhan
        - maghribIqamah
