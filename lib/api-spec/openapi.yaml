          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: adminDeleteUser
      tags: [auth]
      summary: Deactivate (soft-delete) an admin user (super admin only)
      responses:
        "204":
          description: Deactivated
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "400":
          description: Cannot deactivate the last active super admin
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
