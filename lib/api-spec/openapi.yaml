      summary: List past push notification broadcasts (admin)
      parameters:
        - name: page
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 20
      responses:
        "200":
          description: Paginated list of notification broadcasts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationBroadcastHistory"
        "401":
          description: Not authenticated
          content:
