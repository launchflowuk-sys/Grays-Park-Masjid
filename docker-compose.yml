services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: grays_park_masjid
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  api-server:
    build:
      context: .
      dockerfile: Dockerfile.api-server
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/grays_park_masjid
      PORT: "8080"
      NODE_ENV: production
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set}
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:8080}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      MAIL_FROM: ${MAIL_FROM:-no-reply@graysparkmasjid.org.uk}
      DEFAULT_OBJECT_STORAGE_BUCKET_ID: ${DEFAULT_OBJECT_STORAGE_BUCKET_ID:-}
      PRIVATE_OBJECT_DIR: ${PRIVATE_OBJECT_DIR:-}
      PUBLIC_OBJECT_SEARCH_PATHS: ${PUBLIC_OBJECT_SEARCH_PATHS:-}
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:8080/api/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5

  website:
    build:
      context: .
      dockerfile: Dockerfile.website
      args:
        BASE_PATH: /
    restart: unless-stopped
    depends_on:
      - api-server
    environment:
      PORT: "80"
    ports:
      - "8081:80"

volumes:
  postgres-data:
