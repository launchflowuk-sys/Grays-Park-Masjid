services:
  api-server:
    build:
      context: .
      dockerfile: Dockerfile.api-server
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL must be set to your Postgres connection string}
      PORT: "8080"
      NODE_ENV: production
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set}
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:8080}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      MAIL_FROM: ${MAIL_FROM:-no-reply@graysparkmasjid.org.uk}
      LOCAL_STORAGE_DIR: /app/data/uploads
    volumes:
      - uploads-data:/app/data/uploads
    expose:
      - "8080"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:8080/api/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5

  website:
    build:
      context: .
      dockerfile: Dockerfile.website
      args:
        BASE_PATH: /
    restart: unless-stopped
    depends_on:
      - api-server
    environment:
      PORT: "80"
    expose:
      - "80"

volumes:
  uploads-data:
